<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No_AI 🚀</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/marked/4.0.2/marked.min.js"></script>
    
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bot-msg-bg: #f3f4f6;
            --user-msg-bg: #6366f1;
            --text-main: #1f2937;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background: var(--bg-gradient); 
            height: 100vh; margin: 0;
            display: flex; align-items: center; justify-content: center;
        }

        #chat-container {
            width: 95%; max-width: 1000px; height: 90vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px; display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); overflow: hidden;
        }

        header {
            padding: 15px 30px; background: white; border-bottom: 1px solid #eee;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* 模型选择下拉框样式 */
        .model-selector-wrapper {
            display: flex; align-items: center; gap: 10px;
        }
        
        #modelSelect {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
            color: var(--text-main);
            font-size: 13px;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }
        #modelSelect:focus { border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1); }

        .status-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 8px; transition: 0.3s; }
        .offline-dot { background: #ef4444 !important; box-shadow: 0 0 8px #ef4444 !important; }
        .online-dot { background: #10b981; box-shadow: 0 0 8px #10b981; }

        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }

        .message { max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 15px; line-height: 1.6; animation: slideUp 0.4s ease-out; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--user-msg-bg); color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: var(--bot-msg-bg); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid #e5e7eb; }
        
        .message pre { background: #282c34; color: #abb2bf; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }

        #suggestions { display: flex; gap: 10px; padding: 0 25px 15px; overflow-x: auto; }
        .suggest-card { background: white; border: 1px solid #e5e7eb; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .suggest-card:hover { border-color: var(--primary-color); color: var(--primary-color); }

        #input-area { padding: 20px 30px; background: white; display: flex; gap: 12px; }
        input { flex: 1; padding: 14px 20px; border: 2px solid #f3f4f6; border-radius: 12px; outline: none; font-size: 15px; }
        input:focus { border-color: var(--primary-color); }

        button { background: var(--primary-color); color: white; border: none; width: 48px; height: 48px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        .typing { display: flex; gap: 4px; padding: 10px; }
        .typing span { width: 6px; height: 6px; background: #9ca3af; border-radius: 50%; animation: blink 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div id="chat-container">
    <header>
        <div>
            <h3 style="margin:0 0 5px 0; font-size: 18px;">No_AI 🚀</h3>
            <div id="status-text" style="font-size: 12px; color: #6b7280;">
                <span class="status-dot online-dot" id="dot"></span><span id="state-label">在线</span>
            </div>
        </div>
        
        <div class="model-selector-wrapper">
            <i class="fa-solid fa-microchip" style="color: var(--primary-color); font-size: 14px;"></i>
            <select id="modelSelect">
                </select>
        </div>
    </header>

    <div id="messages">
        <div class="message bot">👋 你好！我是你的智能助手。你可以通过右上角切换不同的模型。</div>
    </div>

    <div id="suggestions">
        <div class="suggest-card" onclick="quickAsk('帮我写一段关于春天的优美散文')">✍️ 写散文</div>
        <div class="suggest-card" onclick="quickAsk('用 JavaScript 写一个冒泡排序算法')">💻 写代码</div>
        <div class="suggest-card" onclick="quickAsk('讲一个冷笑话')">🤣 讲笑话</div>
    </div>

    <div id="input-area">
        <input type="text" id="userInput" placeholder="输入您的问题..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
    // --- 1. 配置信息 ---
    //const API_KEY = 'xxxxxx'; 
    const API_URL = '/api/chat'; 
    async function sendMessage() {
    const text = userInput.value.trim();
    const selectedModel = modelSelect.value;
    
    if (!text || sendBtn.disabled) return;

    addMessage(text, 'user');
    chatHistory.push({ role: "user", content: text });
    userInput.value = '';
    
    const botMessageDiv = addMessage('...', 'bot');
    sendBtn.disabled = true;

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            // 注意：这里不需要传 Authorization，后端会自动补上
            body: JSON.stringify({
                model: selectedModel,
                messages: chatHistory,
                stream: false 
            })
        });
    // 可选模型列表
    const MODELS = [
        { name: "Claude 4.5 Thinking (满血版)", value: "熊猫-按量-特供顶级-官方正向满血-claude-sonnet-4.5-thinking" },
        { name: "Chatgpt 5.3-Codex", value: "熊猫-按量-gpt-5.3-codex-满血" },
        // { name: "Gemini 3.1 Pro- Preview", value: "熊猫特供-按量-SSS-gemini-3.1-pro-preview" },
  
    ];

    const messagesContainer = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const dot = document.getElementById('dot');
    const stateLabel = document.getElementById('state-label');
    const modelSelect = document.getElementById('modelSelect');

    let chatHistory = [{ role: "system", content: "你是一个专业的AI助手，使用Markdown格式回答。" }];

    // --- 2. 初始化模型下拉框 ---
    function initModelSelector() {
        MODELS.forEach(model => {
            const option = document.createElement('option');
            option.value = model.value;
            option.text = model.name;
            modelSelect.appendChild(option);
        });
    }
    initModelSelector();

    // --- 3. 实时状态检测逻辑 ---
    function updateStatus() {
        if (navigator.onLine) {
            dot.className = "status-dot online-dot";
            stateLabel.innerText = "在线";
        } else {
            dot.className = "status-dot offline-dot";
            stateLabel.innerText = "离线";
        }
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();

    // --- 4. 聊天功能逻辑 ---
    function addMessage(content, role) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        
        if (role === 'bot') {
            if (content === '...') {
                div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            } else {
                div.innerHTML = (typeof marked !== 'undefined') ? marked.parse(content) : content;
            }
        } else {
            div.innerText = content;
        }
        
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        return div;
    }

    function quickAsk(text) {
        userInput.value = text;
        sendMessage();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        const selectedModel = modelSelect.value; // 获取当前选中的模型
        
        if (!text || sendBtn.disabled) return;

        addMessage(text, 'user');
        chatHistory.push({ role: "user", content: text });
        userInput.value = '';
        
        const botMessageDiv = addMessage('...', 'bot');
        sendBtn.disabled = true;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: selectedModel, // 使用动态选中的模型
                    messages: chatHistory,
                    stream: false 
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || `请求失败`);

            const assistantReply = data.choices[0].message.content;
            botMessageDiv.innerHTML = (typeof marked !== 'undefined') ? marked.parse(assistantReply) : assistantReply;
            chatHistory.push({ role: "assistant", content: assistantReply });

        } catch (error) {
            botMessageDiv.innerHTML = `<span style="color: #ef4444;">❌ 错误: ${error.message}</span>`;
        } finally {
            sendBtn.disabled = false;
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    }

    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
